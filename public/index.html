<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Commodities Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css" />
    <script src="/lib/lightweight-charts/lightweight-charts.standalone.production.js"></script>
    <script src="/shared/chart.js" defer></script>
  </head>
  <body>
    <div class="appbar">
      <div class="brand">Commodities Dashboard</div>
      <div style="margin-left:auto; display:flex; align-items:center; gap:12px;">
        <button id="refreshBtn" class="refresh-btn" title="Refresh data from API">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 2v4h4M14 14v-4h-4M2.5 9A6 6 0 0 1 14 6M13.5 7A6 6 0 0 1 2 10"/>
          </svg>
          Refresh
        </button>
        <span class="badge">Last update: <span id="lastUpdated">—</span></span>
      </div>
    </div>
    <main class="container">
      <div id="cards"></div>
    </main>

    <script>
      const METALS = [
        { name: 'Gold',      key: 'gold',      symbol: 'XAU' },
        { name: 'Silver',    key: 'silver',    symbol: 'XAG' },
        { name: 'Platinum',  key: 'platinum',  symbol: 'XPT' },
        { name: 'Palladium', key: 'palladium', symbol: 'XPD' },
        { name: 'Copper',    key: 'copper',    symbol: 'XCU' },
        { name: 'Nickel',    key: 'nickel',    symbol: 'NI'  },
        { name: 'Cobalt',    key: 'cobalt',    symbol: 'XCO' },
        { name: 'USD/BRL',   key: 'brl',       symbol: 'BRL' },
      ];

      const METAL_CLASS = {
        gold: 'metal-gold', silver: 'metal-silver', platinum: 'metal-platinum',
        palladium: 'metal-palladium', copper: 'metal-copper',
        nickel: 'metal-nickel', cobalt: 'metal-cobalt'
      };

      const nf2 = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 });
      const nf0 = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
      const fxFmt = new Intl.NumberFormat('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 });

      function formatPrice(key, d) {
        if (key === 'brl')    return `${fxFmt.format(d.fxUsdBrl ?? 0)} <span class="unit">USD/BRL</span>`;
        if (key === 'copper' || key === 'nickel')
                              return `${nf2.format(d.usdPerPound ?? 0)} <span class="unit">USD/lb</span>`;
        if (key === 'cobalt') return `${nf0.format(d.usdPerMetricTon ?? 0)} <span class="unit">USD/ton</span>`;
        return `${nf2.format(d.usdPerOunce)} <span class="unit">USD/oz</span>`;
      }

      function createCard(parent, title, metalKey) {
        const div = document.createElement('div');
        div.className = `card ${METAL_CLASS[metalKey] || ''}`;
        div.dataset.metal = metalKey;
        div.innerHTML = `
          <div class="title">${title}</div>
          <div class="value price"><span class="skeleton"></span></div>
          <div class="controls">
            <label class="muted" style="margin-right:auto">Chart</label>
            <select class="tf" aria-label="Timeframe">
              <option value="30">30d</option>
              <option value="90">90d</option>
              <option value="180">180d</option>
              <option value="360" selected>1yr</option>
            </select>
            <select class="per" aria-label="Periodicity">
              <option value="daily" selected>Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
            </select>
          </div>
          <div class="chart-container"></div>
        `;
        div.style.cursor = 'pointer';
        div.addEventListener('click', (e) => {
          const t = e.target;
          const tag = t && t.tagName ? String(t.tagName).toLowerCase() : '';
          if (tag === 'select' || tag === 'option' || tag === 'button') return;
          if (t && typeof t.closest === 'function' && (t.closest('.controls') || t.closest('.card-error'))) return;
          window.location.href = '/' + metalKey + '.html';
        });
        parent.appendChild(div);
        return div;
      }

      function showCardError(card, message, onRetry) {
        const price = card.querySelector('.price');
        price.innerHTML = '<span class="muted" style="font-size:1rem">Unavailable</span>';
        let errEl = card.querySelector('.card-error');
        if (!errEl) {
          errEl = document.createElement('div');
          errEl.className = 'card-error';
          price.after(errEl);
        }
        errEl.innerHTML = `<span>Couldn't load — ${message || 'network error'}</span><button type="button">Retry</button>`;
        errEl.querySelector('button').addEventListener('click', (e) => {
          e.stopPropagation();
          errEl.remove();
          price.innerHTML = '<span class="skeleton"></span>';
          onRetry();
        });
      }

      function renderChangeChip(card, pct) {
        if (!isFinite(pct)) return;
        const price = card.querySelector('.price');
        let chip = card.querySelector('.change-chip');
        if (!chip) {
          chip = document.createElement('span');
          chip.className = 'change-chip';
          price.appendChild(chip);
        }
        const cls = pct > 0.05 ? 'up' : pct < -0.05 ? 'down' : 'flat';
        chip.className = 'change-chip ' + cls;
        const sign = pct > 0 ? '+' : '';
        chip.textContent = `${sign}${pct.toFixed(2)}% 24h`;
      }

      async function load24hChange(key, card) {
        try {
          const r = await DashChart.fetchWithRetry(`/api/${key}/change?date_type=yesterday`, { retries: 0, timeoutMs: 6000 });
          const symbol = METALS.find(m => m.key === key)?.symbol;
          const entry = r && r.rates && symbol ? r.rates[symbol] : null;
          if (entry && typeof entry.change_pct === 'number') {
            // For non-BRL metals, rates are units-per-USD, so a positive change_pct means USD strengthened
            // (i.e. price went down). Invert sign so the chip reads as price change.
            const pct = key === 'brl' ? entry.change_pct : -entry.change_pct;
            renderChangeChip(card, pct);
          }
        } catch { /* chip is optional */ }
      }

      async function loadMetal(key, card) {
        const card_err = card.querySelector('.card-error');
        if (card_err) card_err.remove();
        try {
          const data = await DashChart.fetchWithRetry(`/api/${key}/latest`);
          const d = data.data;
          card.querySelector('.price').innerHTML = formatPrice(key, d);
          const top = document.getElementById('lastUpdated');
          if (top) top.textContent = new Date(d.timestamp).toLocaleString();
          // Fire chart + change-chip in parallel — chart is primary, chip is additive.
          refreshChart(key, card);
          load24hChange(key, card);
        } catch (err) {
          showCardError(card, err && err.message, () => loadMetal(key, card));
        }
      }

      async function refreshChart(key, card) {
        const days = Number(card.querySelector('.tf').value) || 360;
        const periodicity = String(card.querySelector('.per')?.value || 'daily');
        try {
          const ts = await DashChart.fetchWithRetry(`/api/${key}/timeseries?limit=${days + 5}`, { retries: 0 });
          let points = (ts.data.points || []).slice().sort((a, b) => a.t - b.t).slice(-days);
          points = DashChart.applyPeriodicity(points, periodicity);
          DashChart.renderChart(card.querySelector('.chart-container'), points, { metalKey: key });
        } catch { /* chart may fail independently of price */ }
      }

      let cards = [];

      function init() {
        if (typeof LightweightCharts === 'undefined' || !window.DashChart) {
          setTimeout(init, 100);
          return;
        }
        const container = document.getElementById('cards');
        METALS.forEach(m => {
          const card = createCard(container, `${m.name} (${m.symbol})`, m.key);
          cards.push({ key: m.key, card });
          loadMetal(m.key, card);
          card.querySelector('.tf')?.addEventListener('change', () => refreshChart(m.key, card));
          card.querySelector('.per')?.addEventListener('change', () => refreshChart(m.key, card));
        });

        const refreshBtn = document.getElementById('refreshBtn');
        if (refreshBtn) {
          refreshBtn.addEventListener('click', async () => {
            refreshBtn.disabled = true;
            refreshBtn.classList.add('spinning');
            try {
              const res = await fetch('/api/refresh', { method: 'POST' });
              const data = await res.json();
              if (data.success) {
                await Promise.all(cards.map(({ key, card }) => loadMetal(key, card)));
              }
            } catch (err) {
              console.error('Refresh failed:', err);
            } finally {
              refreshBtn.disabled = false;
              refreshBtn.classList.remove('spinning');
            }
          });
        }
      }

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    </script>
  </body>
  </html>
