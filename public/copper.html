<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Copper (XCU) Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css" />
    <script src="/lib/lightweight-charts/lightweight-charts.standalone.production.js"></script>
    <script src="/shared/chart.js" defer></script>
    <script src="/shared/detail.js" defer></script>
  </head>
  <body>
    <div class="appbar">
      <a class="back" href="/">← Back</a>
      <div class="brand">Copper (XCU) Detail</div>
      <div style="margin-left:auto; display:flex; align-items:center; gap:12px;">
        <span class="badge">Last update: <span id="lastUpdated">—</span></span>
      </div>
    </div>
    <main class="container">
      <div class="card metal-copper detail-half">
        <div class="title">Copper</div>
        <div class="muted unit-subtitle">USD/lb</div>
        <div class="value price" id="spot"><span class="skeleton" style="width:40%"></span></div>
        <div class="controls">
          <label class="muted" style="margin-right:auto">Chart</label>
          <select id="tf" aria-label="Timeframe">
            <option value="30">30d</option>
            <option value="90">90d</option>
            <option value="180">180d</option>
            <option value="360" selected>1yr</option>
            <option value="730">2yr</option>
            <option value="1095">3yr</option>
            <option value="1825">5yr</option>
            <option value="all">All</option>
          </select>
          <select id="per" aria-label="Periodicity">
            <option value="daily" selected>Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
          </select>
        </div>
        <div id="chart" class="chart-container" style="height: 400px;"></div>
      </div>
    </main>
    <script>
      document.addEventListener('DOMContentLoaded', () => DashDetail.ready(() => DashDetail.init({ key: 'copper' })));
    </script>
  </body>
</html>
