name: Deploy to Cloud Run

on:
  push:
    branches:
      - feature/deploy-web
      - main

env:
  PROJECT_ID: hip-principle-473317-j4
  REGION: southamerica-east1
  REPO_NAME: dashboard-repo
  SERVICE_NAME: dashboard
  IMAGE_NAME: dashboard
  RUNTIME_SA: 1056503697671-compute@developer.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Preflight secrets
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY_JSON }}" ]; then
            echo "Missing GCP_SA_KEY_JSON repo secret (service account JSON)" >&2; exit 1; fi
          if [ -z "${{ secrets.METALPRICE_API_KEY }}" ]; then
            echo "Missing METALPRICE_API_KEY repo secret" >&2; exit 1; fi

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        env:
          METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}
          METALPRICE_API_BASE: https://api.metalpriceapi.com/v1
          METALPRICE_PLAN: basic
          # Override plan-based default (basic = 10min) to 5min auto-refresh.
          # Basic plan = 10k calls/mo. 5min × 12symbols/call = ~8640 calls/mo.
          METALPRICE_REFRESH_MINUTES: "5"
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          # Optional — leave the GitHub secrets unset for current behavior:
          #   REFRESH_TOKEN unset  → /api/refresh stays anonymous (existing prod behavior)
          #   CORS_ALLOW_ORIGINS unset → server enters same-origin-only mode
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          CORS_ALLOW_ORIGINS: ${{ secrets.CORS_ALLOW_ORIGINS }}
          # Optional — GCS bucket for persistence across restarts. When set,
          # the deploy mounts it at /mnt/data (gcsfuse, requires gen2) and
          # points DATA_DIR there. When unset, behaves exactly as before
          # (ephemeral tmpfs, re-seeds on every restart). To enable:
          #   1. gsutil mb -l southamerica-east1 gs://<bucket>
          #   2. grant the runtime SA roles/storage.objectAdmin on the bucket
          #   3. add DATA_BUCKET as a GitHub Actions secret
          DATA_BUCKET: ${{ secrets.DATA_BUCKET }}
        run: |
          VOLUME_ARGS=""
          DATA_DIR_PREFIX=""
          if [ -n "$DATA_BUCKET" ]; then
            echo "Persistence enabled: mounting gs://$DATA_BUCKET at /mnt/data"
            VOLUME_ARGS="--execution-environment=gen2 --add-volume=name=data,type=cloud-storage,bucket=$DATA_BUCKET --add-volume-mount=volume=data,mount-path=/mnt/data"
            DATA_DIR_PREFIX="DATA_DIR=/mnt/data,"
          else
            echo "DATA_BUCKET unset — running with ephemeral storage (re-seeds on restart)"
          fi
          gcloud run deploy $SERVICE_NAME \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$IMAGE_NAME:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --service-account $RUNTIME_SA \
            --min-instances 1 \
            --no-cpu-throttling \
            $VOLUME_ARGS \
            --update-env-vars ${DATA_DIR_PREFIX}METALPRICE_API_KEY=$METALPRICE_API_KEY,METALPRICE_API_BASE=$METALPRICE_API_BASE,METALPRICE_PLAN=$METALPRICE_PLAN,METALPRICE_REFRESH_MINUTES=$METALPRICE_REFRESH_MINUTES,NEWS_API_KEY=$NEWS_API_KEY,REFRESH_TOKEN=$REFRESH_TOKEN,CORS_ALLOW_ORIGINS=$CORS_ALLOW_ORIGINS
